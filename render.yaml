services:
  - type: web
    name: voleizou
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: voleizou-db
          property: connectionString

databases:
  - name: voleizou-db
    databaseName: voleizou
    plan: free
